services:
  # ── API ────────────────────────────────────────────────────────────────────
  - type: web
    name: sellface-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVICE_ROLE
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: APNS_BUNDLE_ID
        value: com.mike.SellFace
      - key: APNS_USE_SANDBOX
        value: false
      # Fill these in the Render dashboard after first deploy:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ASTRIA_API_KEY
        sync: false
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_PRIVATE_KEY
        sync: false

  # ── Celery: training queue ─────────────────────────────────────────────────
  - type: worker
    name: sellface-worker-training
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVICE_ROLE
        value: worker-training
      - key: DATABASE_URL
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ASTRIA_API_KEY
        sync: false
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_PRIVATE_KEY
        sync: false
      - key: APNS_BUNDLE_ID
        value: com.mike.SellFace
      - key: APNS_USE_SANDBOX
        value: false

  # ── Celery: generation queue ───────────────────────────────────────────────
  - type: worker
    name: sellface-worker-generation
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVICE_ROLE
        value: worker-generation
      - key: DATABASE_URL
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: sellface-redis
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ASTRIA_API_KEY
        sync: false
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_PRIVATE_KEY
        sync: false
      - key: APNS_BUNDLE_ID
        value: com.mike.SellFace
      - key: APNS_USE_SANDBOX
        value: false

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: sellface-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

# ── PostgreSQL ─────────────────────────────────────────────────────────────
databases:
  - name: sellface-db
    databaseName: sellface
    user: sellface
    region: oregon
    plan: free
