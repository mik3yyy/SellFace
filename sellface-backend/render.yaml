services:
  - type: web
    name: sellface-api
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVICE_ROLE
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: APNS_BUNDLE_ID
        value: com.mike.SellFace
      - key: APNS_USE_SANDBOX
        value: false
      # Set these in the Render dashboard:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ASTRIA_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

  - type: worker
    name: sellface-worker
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVICE_ROLE
        value: worker
      - key: DATABASE_URL
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sellface-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ASTRIA_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

databases:
  - name: sellface-db
    databaseName: sellface
    user: sellface
    region: oregon
    plan: free
