# docker-compose.override.yml — local development only.
# Docker Compose automatically merges this with docker-compose.yml.
# Do NOT commit secrets here; use .env instead.
version: "3.9"

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  worker-training:
    volumes:
      - .:/app

  worker-generation:
    volumes:
      - .:/app
